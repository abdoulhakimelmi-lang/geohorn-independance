<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GeoHorn - Photo Indépendance Djibouti</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef3f7;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 0 15px rgba(0,0,0,0.15);
    }

    h1 {
      color: #003366;
    }

    input, button {
      margin: 10px;
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #0077cc;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #005fa3;
    }

    canvas {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🇩🇯 Photo spéciale Indépendance de Djibouti</h1>
    <p>Ajoute ta photo, puis télécharge ton image décorée par GeoHorn.</p>

    <input type="file" id="photoInput" accept="image/*">

    <br>

    <canvas id="canvas" width="1240" height="1240"></canvas>

    <br>

    <button onclick="downloadImage()">Télécharger ma photo</button>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const template = new Image();
    template.src = "designn.png"; // nom de ton design

    let uploadedPhoto = null;

    template.onload = function () {
      drawTemplateOnly();
    };

    function drawTemplateOnly() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(template, 0, 0, canvas.width, canvas.height);
    }

    document.getElementById("photoInput").addEventListener("change", function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        uploadedPhoto = new Image();

        uploadedPhoto.onload = function () {
          drawFinalImage();
        };

        uploadedPhoto.src = e.target.result;
      };

      reader.readAsDataURL(file);
    });

    function drawFinalImage() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Position du cercle central
      const centerX = 620;
      const centerY = 555;
      const radius = 345;

      const userPhoto = uploadedPhoto;

      // Recadrage carré automatique
      const size = Math.min(userPhoto.width, userPhoto.height);
      const sx = (userPhoto.width - size) / 2;
      const sy = (userPhoto.height - size) / 2;

      // 1. Dessiner la photo d'abord
      ctx.save();

      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();

      ctx.drawImage(
        userPhoto,
        sx,
        sy,
        size,
        size,
        centerX - radius,
        centerY - radius,
        radius * 2,
        radius * 2
      );

      ctx.restore();

      // 2. Dessiner le design par-dessus
      ctx.drawImage(template, 0, 0, canvas.width, canvas.height);
    }

    function downloadImage() {
      const link = document.createElement("a");
      link.download = "photo-independance-djibouti-geohorn.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
